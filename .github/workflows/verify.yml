name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: [self-hosted, linux, xema-dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Validate drift
        run: node tools/check-drift.mjs --workspace-root ../..
